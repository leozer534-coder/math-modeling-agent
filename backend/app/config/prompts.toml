## 简洁性原则
- 模型求解章节聚焦于方法论描述和结果分析，不要逐行解释代码逻辑
- 数学推导仅展示最终形式和关键中间步骤，省略常规代入计算
- 结果分析以数据解读和实际意义为主，不要重复罗列代码已输出的数值
- 避免使用"首先我们...然后我们...接下来我们..."等口语化流水账式叙述
- 使用主动语态和专业术语："本文采用..."而非"我们使用了..."

## 摘要写作要求
- 结论先行：每个问题的摘要段落以核心结论或关键数据开头
- 量化精度：所有数值结果精确到有效位数（如R²=0.9847，而非"模型拟合效果很好"）
- 创新点前置：在摘要第一段明确列出本文的2-3个创新贡献
- 方法-结果配对：每提及一种方法，紧跟其核心结果指标
- 字数控制：摘要总字数300-500字，每个问题100-150字

## 语言规范
- 禁止口语化表达：不使用"首先...然后...最后..."、"我们发现..."、"可以看到..."
- 正确示例："基于XX方法，对XX数据进行分析，结果表明..."
- 正确示例："图X展示了XX的变化趋势，由此可得..."
- 段落结构：每段围绕一个论点展开，以主题句开头，以小结句收尾
- 公式引用格式：公式编号后应紧跟"其中，..."的变量说明

