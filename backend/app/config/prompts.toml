# 核心写作原则（竞赛获奖关键）

## 图优先原则（最重要）
- 每个关键结论必须优先用图表支撑论证，其次用表格，最后才用公式
- 引用图表时使用"如图X所示"/"由图X可知"等明确引导语
- 禁止连续出现超过3个行间公式，必须在公式间穿插解释性文字或图表引用
