# =============================================================================
# MathModelAgent - CD 自动部署流水线
# =============================================================================
# 触发条件: main 分支 push 且 CI 通过
# 功能: 构建 Docker 镜像 -> 推送到 GitHub Container Registry -> 部署
#
# 前置条件:
#   1. 仓库需要启用 GitHub Container Registry (ghcr.io)
#   2. 如需 SSH 部署，需在 Settings > Secrets 中配置:
#      - DEPLOY_HOST: 目标服务器地址
#      - DEPLOY_USER: SSH 用户名
#      - DEPLOY_KEY: SSH 私钥
#      - DEPLOY_PATH: 服务器上的项目路径
#
# Environment Protection Rules (建议在 GitHub 仓库设置中配置):
#   - production 环境: 需要至少 1 名审批者确认
#   - staging 环境: 可自动部署，无需审批
#   - 建议在 Settings > Environments 中创建 "production" 和 "staging"
#   - 可配置部署分支限制: 仅允许 main 分支部署到 production
#   - 可配置等待计时器: 部署前等待 N 分钟，便于紧急取消
# =============================================================================

name: CD - 自动部署

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

env:
  # GitHub Container Registry 镜像地址
  REGISTRY: ghcr.io
  # 镜像名称 (自动使用仓库名)
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx
  SANDBOX_IMAGE: ghcr.io/${{ github.repository }}/sandbox

jobs:
  # ============= 前置检查: 确保 CI 通过 =============
  check-ci:
    name: 检查 CI 状态
    runs-on: ubuntu-latest
    # 仅在 CI 工作流成功完成时运行
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: 确认 CI 通过
        id: check
        run: |
          echo "CI 工作流已成功完成，允许部署"
          echo "should_deploy=true" >> $GITHUB_OUTPUT

  # ============= 构建并推送 Docker 镜像 =============
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ needs.check-ci.outputs.should_deploy == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 使用触发 CI 的那个 commit
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Git 元数据 (用于镜像标签)
        id: meta
        run: |
          # 短 commit SHA 作为标签
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          # 构建时间戳
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      # --- 后端镜像 ---
      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}

      # --- 前端镜像 (生产构建) ---
      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}

      # --- Nginx 镜像 ---
      - name: 构建并推送 Nginx 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:latest
            ${{ env.NGINX_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 沙箱镜像 ---
      - name: 构建并推送沙箱镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.sandbox
          push: true
          tags: |
            ${{ env.SANDBOX_IMAGE }}:latest
            ${{ env.SANDBOX_IMAGE }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像摘要
        run: |
          echo "## 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ steps.meta.outputs.short_sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ steps.meta.outputs.short_sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nginx | \`${{ steps.meta.outputs.short_sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sandbox | \`${{ steps.meta.outputs.short_sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY

  # ============= 部署到 Staging 环境 =============
  deploy-staging:
    name: 部署到 Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    # 建议在 GitHub Settings > Environments 中创建 "staging" 环境
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: 检出代码 (获取 docker-compose 文件)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 提取短 SHA
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      # 通过 SSH 部署到目标服务器
      # 需要在 Secrets 中配置: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY, DEPLOY_PATH
      - name: SSH 部署到 Staging 服务器
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            cd ${{ secrets.STAGING_PATH }}

            # 拉取最新镜像
            echo ">>> 拉取最新镜像 (标签: ${{ steps.meta.outputs.short_sha }})"
            docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            docker pull ${{ env.NGINX_IMAGE }}:${{ steps.meta.outputs.short_sha }}

            # 使用指定版本标签更新服务
            export IMAGE_TAG=${{ steps.meta.outputs.short_sha }}
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # 等待健康检查通过
            echo ">>> 等待服务启动..."
            sleep 15

            # 验证服务状态
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps
            echo ">>> Staging 部署完成"

      - name: 输出部署信息 (未配置 SSH 时)
        if: ${{ vars.DEPLOY_ENABLED != 'true' }}
        run: |
          echo "## Staging 部署 - 镜像已就绪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "镜像已推送到 GHCR，可通过以下命令手动部署:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 拉取镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 启动服务" >> $GITHUB_STEP_SUMMARY
          echo "docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 如需启用自动 SSH 部署，请在仓库 Settings > Variables 中设置 DEPLOY_ENABLED=true" >> $GITHUB_STEP_SUMMARY
          echo "> 并在 Secrets 中配置 STAGING_HOST, STAGING_USER, STAGING_KEY, STAGING_PATH" >> $GITHUB_STEP_SUMMARY

  # ============= 部署到 Production 环境 =============
  # 注意: Production 部署建议通过 release.yml (Git Tag) 触发
  # 此处保留入口，但默认禁用，仅在明确配置后启用
  #
  # 启用方法:
  #   1. 在 GitHub Settings > Environments 中创建 "production" 环境
  #   2. 配置 Required reviewers (至少 1 人)
  #   3. 配置 Deployment branches: 仅允许 main
  #   4. 在 Variables 中设置 PROD_DEPLOY_ENABLED=true
  #   5. 在 Secrets 中配置 PROD_HOST, PROD_USER, PROD_KEY, PROD_PATH
  deploy-production:
    name: 部署到 Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    # 需要手动审批 (在 GitHub Environment 中配置 Required reviewers)
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    # 仅在明确启用时运行
    if: ${{ vars.PROD_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: 提取短 SHA
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: SSH 部署到 Production 服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            cd ${{ secrets.PROD_PATH }}

            # 备份当前版本信息
            echo "$(date): 部署版本 ${{ steps.meta.outputs.short_sha }}" >> deploy.log

            # 拉取镜像
            docker pull ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            docker pull ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.short_sha }}
            docker pull ${{ env.NGINX_IMAGE }}:${{ steps.meta.outputs.short_sha }}

            # 滚动更新
            export IMAGE_TAG=${{ steps.meta.outputs.short_sha }}
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps backend
            sleep 10
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend nginx

            # 健康检查
            sleep 15
            curl -f http://localhost:8000/health || (echo "健康检查失败!" && exit 1)

            # 清理旧镜像
            docker image prune -f
            echo ">>> Production 部署完成"

      - name: 输出 Production 部署摘要
        run: |
          echo "## Production 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 版本: \`${{ steps.meta.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
