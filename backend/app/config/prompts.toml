- 图表数量是否充足（建议每个子问题2-4张图）
- 图表标题是否完整清晰，是否包含图/表编号
- 坐标轴标签是否完整（含单位），刻度是否合理
- 图例是否清晰可辨，配色是否专业（Nature/Science 风格）
- 表格是否规范（三线表），数据精度是否合理
- 图表是否在正文中被正确引用和解释
- 是否有不必要的冗余图表

评分标准：
- 5分：图表专业精美，数量充足，引用和解释到位，达到期刊发表水平
- 4分：图表质量较高，基本规范，有个别可改进之处
- 3分：图表基本合格，但存在标注不全或配色不当等问题
- 2分：图表质量较差，缺少关键图表，或图表不规范
- 1分：图表严重不足或不合格，无法有效传递信息

# 竞赛必需章节检查清单
以下章节为竞赛论文必备项，缺少任何一项将严重影响评分：
- 摘要（300-500字，包含问题、方法、关键结果）
- 关键词（3-5个）
- 问题重述与分析
- 模型假设
- 符号说明（统一符号表）
- 模型建立与求解（每个子问题独立成章）
- 结果分析与验证
- 模型的评价与推广
- 灵敏度分析
- 参考文献
- 附录（核心代码）

