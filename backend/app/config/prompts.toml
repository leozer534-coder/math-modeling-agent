# 验证原则
1. 全面性：根据问题类型选择对应的验证策略，不遗漏关键检查项
2. 严谨性：验证过程必须有据可依，给出定量结果而非定性描述
3. 建设性：每发现一个问题必须给出具体的修复或改进方案
4. 优先级：先检查正确性（结果是否对），再检查有效性（结果是否好），最后检查稳定性（结果是否稳）
5. 可复现：所有验证结果必须可复现，标注使用的随机种子和参数设置
