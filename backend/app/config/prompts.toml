# 数据质量评估体系

## 1. 数据完整性检查
- **缺失值分析**：
  - 统计每列缺失值数量和比例
  - 缺失比例阈值判断：<5% 轻微，5%-20% 中等，20%-50% 严重，>50% 建议删除该列
  - 分析缺失模式：完全随机缺失（MCAR）、随机缺失（MAR）、非随机缺失（MNAR）
  - 缺失值处理策略推荐：
    - 数值型：均值/中位数填充（对称分布用均值，偏态分布用中位数）、KNN填充、多重插补（MICE）
    - 分类型：众数填充、新增"未知"类别
    - 时序型：前向填充、后向填充、线性插值、样条插值
- **重复值检测**：
  - 完全重复行识别与统计
  - 基于关键列的部分重复检测
  - 重复值处理建议（保留/删除/合并）

## 2. 异常值检测方法
根据数据分布特征选择合适的异常值检测方法：
- **IQR 方法**（适用于偏态分布）：
  - Q1 - 1.5*IQR 至 Q3 + 1.5*IQR 为正常范围
  - 超出 3*IQR 为极端异常值
- **Z-score 方法**（适用于近似正态分布）：
  - |Z| > 3 视为异常值
  - 改进版：使用 MAD（中位数绝对偏差）替代标准差，增强鲁棒性
- **Isolation Forest**（适用于高维数据）：
  - 多特征联合异常检测
  - 适合发现多变量组合异常
- **LOF 方法**（局部离群因子）：
  - 基于密度的异常检测，适合分布不均匀的数据
- 异常值处理策略：删除、截断（Winsorize）、替换（中位数替换）、保留但标记

## 3. 数据类型判断与转换
- 自动识别列的语义类型：数值型（连续/离散）、分类型（有序/无序）、日期时间型、文本型
- 检查类型不匹配：数值列存储为字符串、日期列未解析、分类变量编码为数值
- 数据精度检查：浮点精度是否过高或过低，整数列是否可降低存储类型

# 统计分析方法指导

## 描述性统计
- 集中趋势：均值、中位数、众数、截断均值
- 离散程度：标准差、方差、变异系数（CV）、四分位距（IQR）
- 分布形态：偏度（Skewness）、峰度（Kurtosis）
- 分位数分析：5%、25%、50%、75%、95% 分位数

## 正态性检验（为后续模型选择提供依据）
- Shapiro-Wilk 检验（样本量 < 5000 时推荐）
- Kolmogorov-Smirnov 检验（大样本）
- Anderson-Darling 检验
- Q-Q 图直观判断
- 若不满足正态性：考虑 Box-Cox 变换、对数变换、幂变换

## 假设检验方法选择指南
- **两组均值比较**：
  - 正态 + 方差齐性 -> 独立样本 t 检验
  - 正态 + 方差不齐 -> Welch t 检验
  - 非正态 -> Mann-Whitney U 检验
- **多组均值比较**：
  - 正态 + 方差齐性 -> 单因素 ANOVA
  - 不满足条件 -> Kruskal-Wallis 检验
  - 事后检验：Tukey HSD、Bonferroni 校正
- **分类变量关联**：
  - 卡方检验（期望频次 >= 5）
  - Fisher 精确检验（小样本）
- **相关性分析**：
  - Pearson 相关系数（线性关系，正态分布）
  - Spearman 秩相关（单调关系，无分布假设）
  - Kendall tau（有序分类变量）
  - 相关性强度判断：|r| < 0.3 弱，0.3-0.7 中等，> 0.7 强

# 特征工程策略

## 标准化与归一化选择
- **Z-score 标准化**（StandardScaler）：适用于算法对特征尺度敏感且数据近似正态分布的场景（如 SVM、KNN、PCA）
- **Min-Max 归一化**（MinMaxScaler）：适用于需要将数据映射到固定区间的场景（如神经网络输入）
- **RobustScaler**：适用于含异常值的数据，基于中位数和 IQR 缩放
- **对数变换**：适用于右偏分布数据，压缩极端值
- **Box-Cox 变换**：自动寻找最优幂变换参数，要求数据为正数

## 编码方法
- **独热编码**（One-Hot）：适用于无序分类变量，类别数 < 10
- **标签编码**（Label Encoding）：适用于有序分类变量（如等级：低/中/高）
- **目标编码**（Target Encoding）：适用于高基数分类变量，需注意过拟合风险
- **频率编码**：用类别出现频率替换，适合树模型
- **二进制编码**：高基数分类变量的折中方案

## 特征选择方法
- **过滤法**：方差阈值、相关系数、互信息、卡方检验
- **包装法**：递归特征消除（RFE）、前向/后向选择
- **嵌入法**：L1 正则化（Lasso）、树模型特征重要性、Permutation Importance
- 特征选择原则：先用过滤法快速筛选，再用包装法或嵌入法精选

# 大规模数据处理策略

## 采样策略
- 数据量 > 100万行时，建议先采样进行探索性分析
- 随机采样：简单随机、分层抽样（保持类别分布）
- 采样比例建议：探索阶段 1%-10%，建模阶段根据模型需求确定

## 降维建议
- **PCA**（主成分分析）：线性降维，保留方差解释比例 > 95% 的主成分
- **t-SNE**：非线性降维，适合高维数据可视化（2D/3D），不适合作为特征输入模型
- **UMAP**：非线性降维，速度优于 t-SNE，可用于可视化和特征提取
- **特征聚合**：对同类特征进行统计聚合（均值、最大值、标准差）

## 计算资源估算
- 估算数据集内存占用：行数 * 列数 * 每列字节数
- 推荐处理方式：< 1GB 直接加载，1-10GB 使用 chunk 分块，> 10GB 使用 Dask/Vaex

