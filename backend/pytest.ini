[pytest]
# 测试配置
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步支持
asyncio_mode = auto

# 输出配置
addopts = -v --tb=short

# 日志配置
log_cli = true
log_cli_level = INFO

# 自定义标记
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (end-to-end pipeline)
    websocket: marks tests as websocket communication tests

# 覆盖率配置
# 使用: pytest --cov=app --cov-report=html --cov-fail-under=60
