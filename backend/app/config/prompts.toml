# 按问题类型差异化验证策略

## 一、优化类问题验证
### 约束满足性检查
- 逐一验证所有等式约束是否精确满足（允许误差 < 1e-6）
- 逐一验证所有不等式约束是否严格满足
- 检查决策变量是否在定义域范围内（整数变量是否为整数，二元变量是否为0/1）
- 检查隐含约束（如非负性、逻辑约束）是否满足

### 目标函数值合理性
- 目标函数值是否在合理的物理/现实范围内
- 与问题背景对照，结果是否符合直觉和常识
- 对比松弛问题的解（如将整数规划松弛为线性规划），验证最优值的合理区间

### 最优性验证
- 线性规划：检查对偶问题的解和互补松弛条件
- 非线性规划：检查 KKT 条件是否满足（梯度条件、互补条件、可行性）
- 元启发式算法：多次独立运行（至少5次），统计最优值的均值和方差，验证收敛一致性
- 对比不同初始解/参数设置下的结果稳定性
- 若可能，与已知最优解或理论下界进行对比

### 灵敏度分析
- 对关键参数进行扰动（正负10%-20%），观察目标函数值变化
- 识别影响最大的约束（影子价格/对偶变量分析）
- 绘制参数-目标函数响应曲面图

## 二、预测类问题验证
### 数据划分验证
- 确认训练集/测试集划分比例合理（通常 70:30 或 80:20）
- 时间序列数据必须按时间顺序划分，禁止随机划分（防止数据泄漏）
- 检查划分后各子集的数据分布是否一致（特征分布、目标变量分布）
- 如样本量充足，使用三集划分（训练集/验证集/测试集）

### 评估指标体系
- RMSE（均方根误差）：对大误差敏感，单位与目标变量一致
- MAE（平均绝对误差）：鲁棒性好，不受极端值影响
- MAPE（平均绝对百分比误差）：无量纲，便于跨数据集比较（目标值不能为0）
- R2（决定系数）：解释方差比例，1为完美拟合，可为负值（模型差于均值预测）
- 调整R2：考虑特征数量的惩罚，防止过拟合假象

### 预测趋势合理性
- 预测值的趋势是否与历史趋势一致
- 预测区间是否随时间增大（不确定性累积）
- 外推预测是否存在不合理的发散或震荡
- 残差是否随机分布（残差图、自相关函数ACF图）
- 残差是否存在异方差性（Breusch-Pagan检验）

### 交叉验证
- K折交叉验证（K=5或10），报告各折指标的均值和标准差
- 时间序列使用滚动窗口交叉验证（Time Series Split）
- 计算交叉验证得分的变异系数，评估模型稳定性

## 三、分类类问题验证
### 混淆矩阵分析
- 构建完整的混淆矩阵（TP、FP、TN、FN）
- 多分类问题：构建多类混淆矩阵，分析各类别的识别效果
- 识别模型的主要混淆方向（哪些类别容易被混淆）

### 评估指标
- 精确率（Precision）：关注假阳性代价高的场景
- 召回率（Recall）：关注假阴性代价高的场景
- F1-score：精确率和召回率的调和平均
- 宏平均（Macro）vs 微平均（Micro）vs 加权平均（Weighted）：根据类别不平衡程度选择
- AUC-ROC曲线：评估分类器在不同阈值下的综合性能
- 对于不平衡数据集：使用 PR 曲线（Precision-Recall Curve）替代 ROC

### 交叉验证与泛化
- 分层K折交叉验证（Stratified K-Fold），保持各折中类别比例一致
- 检查训练集和测试集上的性能差距（过拟合诊断）
- 学习曲线分析：判断模型是否存在偏差或方差问题
- 如有条件，进行嵌套交叉验证（外层评估性能，内层调参）

## 四、评价类问题验证
### 权重合理性检查
- 权重归一化验证：所有权重之和是否为1（或百分比之和为100%）
- 权重符号合理性：正向指标权重为正，负向指标权重为正但评分取逆
- 权重大小合理性：重要指标的权重是否确实大于次要指标
- 多种赋权方法对比：主观赋权（AHP）与客观赋权（熵权法）的结果一致性

### AHP 一致性检验
- 计算一致性指标 CI = (lambda_max - n) / (n - 1)
- 查表获取随机一致性指标 RI
- 计算一致性比率 CR = CI / RI
- 严格要求 CR < 0.1，否则需要调整判断矩阵
- 对于大规模判断矩阵（n > 10），可适当放宽至 CR < 0.12

### 排序稳定性检验
- 对输入数据进行小幅扰动（正负5%），检查排序结果是否变化
- 删除某个评价指标后，排序是否发生显著变化（指标敏感性）
- 删除某个评价对象后，其余对象的排序是否保持一致（秩逆转检验）
- 使用多种评价方法（TOPSIS、VIKOR、灰色关联）交叉验证排序一致性

## 五、图论类问题验证
### 图结构验证
- 图的连通性检查：无向图是否连通，有向图是否强连通/弱连通
- 节点数和边数是否与问题描述一致
- 边权值是否合理（非负性、对称性等约束）
- 邻接矩阵/邻接表的正确性

### 路径可行性验证
- 输出路径上的每条边是否存在于图中
- 路径是否满足问题约束（如容量约束、时间窗约束）
- 路径长度/费用的计算是否正确（逐边累加验证）
- 是否遗漏了必经节点或重复访问了禁止重复的节点

### 最优性证明
- 与暴力枚举对比（小规模问题）
- 与理论下界对比（如 MST 的下界为所有边权之和 / (n-1)）
- 松弛问题的最优值作为下界
- 多种算法交叉验证（如 Dijkstra 与 Bellman-Ford 结果对比）

# 代码-模型一致性检查

## 公式实现一致性
- 代码中的目标函数实现是否与建模方案中的数学公式一致
- 约束条件是否完整实现，有无遗漏
- 变量定义和取值范围是否与建模方案一致
- 数据预处理步骤是否与方案描述一致

## 算法实现正确性
- 核心算法的实现是否符合标准算法描述
- 循环边界、索引起止是否正确
- 特殊情况处理是否完善（空集、单元素、边界值）
- 随机种子是否设置（确保可复现性）

# 数值稳定性检查

## 常见数值问题检测
- NaN 值检测：计算结果中是否存在 NaN（除零、对数负数、根号负数）
- Inf 值检测：是否存在正无穷或负无穷（指数溢出、除以极小数）
- 数值溢出：大数乘法或阶乘是否超出浮点范围
- 数值下溢：极小概率的乘积是否趋近于0（建议使用对数空间计算）
- 浮点精度问题：比较浮点数是否使用了容差而非严格等号

## 数值稳定性改进建议
- 矩阵运算：检查条件数（条件数 > 1e10 需警惕），建议使用正则化或 SVD 分解
- 迭代算法：检查收敛判据是否合理，是否设置了最大迭代次数
- 概率计算：使用 log-sum-exp 技巧避免下溢
- 梯度计算：检查梯度是否存在爆炸或消失现象

